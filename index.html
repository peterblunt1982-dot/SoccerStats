<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Redbacks Stats">
<meta name="theme-color" content="#1a0005">
<title>Redbacks Stats</title>
<style>
  :root {
    --red:        #C0001E;
    --red-deep:   #1a0005;
    --red-mid:    #8a0016;
    --red-pale:   #f7dde1;
    --black:      #111111;
    --white:      #ffffff;
    --off-white:  #f8f5f5;
    --gray-light: #ede8e8;
    --gray-mid:   #a89898;
    --gray-dark:  #3d2e2e;
    --gold:       #c49a28;
    --gold-dark:  #8a6a10;
    --shadow-sm:  0 1px 5px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--red-deep);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    color: var(--gray-dark);
    overscroll-behavior: none;
  }

  /* HEADER */
  .header {
    background: var(--red-deep);
    padding: 52px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 11px; }
  .header-logo {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    border: 2px solid rgba(192,0,30,0.6);
    font-size: 22px;
  }
  .header-logo img { width: 36px; height: 36px; object-fit: contain; }
  .header-title { display: flex; flex-direction: column; }
  .header-title .kicker {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--red-pale); opacity: 0.6; font-weight: 500;
  }
  .header-title h1 { font-size: 17px; font-weight: 900; color: var(--white); letter-spacing: -0.3px; }
  .header-title h1 span { color: var(--red); }

  .match-badge {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 7px 13px;
    display: flex; flex-direction: column; align-items: flex-end;
    cursor: pointer; flex-shrink: 0;
  }
  .match-badge:active { background: rgba(255,255,255,0.14); }
  .match-badge .date-label { font-size: 9px; color: var(--red-pale); opacity: 0.65; letter-spacing: 1px; text-transform: uppercase; }
  .match-badge .date-val { font-size: 13px; font-weight: 700; color: var(--white); }

  .header-stripe {
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 16px, var(--black) 16px, var(--black) 32px);
    margin: 0 16px; border-radius: 2px; opacity: 0.55;
  }

  /* SCOREBOARD */
  .scoreboard {
    background: var(--red); margin: 10px 16px 0;
    border-radius: 16px; padding: 14px 20px;
    display: flex; justify-content: space-around;
    position: relative; overflow: hidden;
  }
  .scoreboard::after {
    content: ''; position: absolute; bottom: -24px; left: -24px;
    width: 110px; height: 110px; background: rgba(0,0,0,0.12); border-radius: 50%;
  }
  .score-item { text-align: center; position: relative; z-index: 1; }
  .score-num { font-size: 32px; font-weight: 900; color: var(--white); letter-spacing: -1px; line-height: 1; }
  .score-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 3px; }
  .score-divider { width: 1px; background: rgba(255,255,255,0.18); margin: 4px 0; }

  /* CONTENT */
  .content {
    background: var(--off-white); border-radius: 24px 24px 0 0;
    margin-top: 14px; min-height: calc(100vh - 200px); padding: 0 0 110px;
  }
  .section-label {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--gray-mid); font-weight: 700; padding: 20px 20px 10px;
  }

  /* PLAYER LIST */
  .player-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
  .player-card {
    background: var(--white); border-radius: 16px; padding: 13px 14px;
    display: flex; align-items: center; gap: 11px;
    box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.05);
    transition: transform 0.1s;
  }
  .player-card:active { transform: scale(0.99); }
  @keyframes flashGoal   { 0%{background:var(--white)} 25%{background:#fce6e9} 100%{background:var(--white)} }
  @keyframes flashAssist { 0%{background:var(--white)} 25%{background:#fdf5dc} 100%{background:var(--white)} }
  .player-card.flash-goal   { animation: flashGoal   0.55s ease; }
  .player-card.flash-assist { animation: flashAssist 0.55s ease; }

  .player-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--red-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: var(--white); flex-shrink: 0;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-size: 15px; font-weight: 700; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-stats { font-size: 12px; color: var(--gray-mid); margin-top: 2px; }
  .player-stats span { margin-right: 10px; }
  .player-stats .stat-g { color: var(--red); font-weight: 700; }
  .player-stats .stat-a { color: var(--gold-dark); font-weight: 700; }

  .player-actions { display: flex; gap: 7px; flex-shrink: 0; }
  .btn-action {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
    transition: transform 0.1s, opacity 0.1s;
    user-select: none; -webkit-user-select: none;
    padding: 8px 10px; min-width: 52px;
  }
  .btn-action:active { transform: scale(0.88); }
  .btn-action.loading { opacity: 0.4; pointer-events: none; }
  .btn-goal   { background: var(--red-deep); color: var(--white); }
  .btn-assist { background: var(--gold);     color: var(--white); }
  .btn-icon  { font-size: 17px; line-height: 1; }
  .btn-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; margin-top: 3px; }

  /* DATE MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--white); border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; padding: 24px 24px 44px; }
  .modal-handle { width: 36px; height: 4px; background: var(--gray-light); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 17px; font-weight: 800; color: var(--black); margin-bottom: 16px; text-align: center; }
  .modal-sheet input[type="date"] {
    width: 100%; padding: 14px 16px; font-size: 16px; font-family: inherit;
    border: 1.5px solid var(--gray-light); border-radius: 12px; outline: none;
    color: var(--gray-dark); background: var(--off-white); margin-bottom: 16px;
  }
  .modal-sheet input[type="date"]:focus { border-color: var(--red); }
  .btn-confirm {
    width: 100%; padding: 16px; background: var(--red); color: var(--white);
    font-size: 16px; font-weight: 800; font-family: inherit; border: none; border-radius: 14px; cursor: pointer;
  }

  /* SETUP SCREEN */
  .setup-screen {
    position: fixed; inset: 0; background: var(--red-deep); z-index: 300;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 28px; text-align: center;
  }
  .setup-screen.hidden { display: none; }
  .setup-club-logo {
    width: 88px; height: 88px; background: var(--white); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; border: 3px solid var(--red); overflow: hidden; font-size: 40px;
  }
  .setup-club-logo img { width: 74px; height: 74px; object-fit: contain; }
  .setup-screen h2 { font-size: 21px; font-weight: 900; color: var(--white); margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--red-pale); opacity: 0.7; margin-bottom: 28px; line-height: 1.65; }
  .setup-screen input {
    width: 100%; padding: 16px; font-size: 14px; font-family: inherit;
    border: 1.5px solid rgba(255,255,255,0.14); border-radius: 14px; outline: none;
    color: var(--white); background: rgba(255,255,255,0.08); margin-bottom: 12px; text-align: center;
  }
  .setup-screen input::placeholder { color: rgba(255,255,255,0.32); }
  .btn-setup {
    width: 100%; padding: 16px; background: var(--red); color: var(--white);
    font-size: 16px; font-weight: 800; font-family: inherit; border: none; border-radius: 14px; cursor: pointer; margin-top: 8px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--black); color: var(--white);
    padding: 12px 22px; border-radius: 24px; font-size: 13px; font-weight: 600;
    z-index: 400; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--red-deep); border: 1px solid var(--red); }
  .toast.error   { background: #6b1a00; }

  /* LOADING */
  .loading-state { text-align: center; padding: 52px 24px; color: var(--gray-mid); font-size: 14px; }
  .spinner {
    width: 30px; height: 30px; border: 3px solid var(--gray-light);
    border-top-color: var(--red); border-radius: 50%;
    animation: spin 0.75s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { color: var(--gray-mid); font-size: 14px; line-height: 1.6; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--gray-light);
    padding: 12px 16px 30px; display: flex; gap: 10px;
    z-index: 100; max-width: 500px; margin: 0 auto;
  }
  .btn-reset {
    flex: 1; padding: 14px; background: var(--off-white); color: var(--gray-mid);
    font-size: 13px; font-weight: 600; font-family: inherit;
    border: 1px solid var(--gray-light); border-radius: 12px; cursor: pointer;
  }
  .btn-reload {
    flex: 2; padding: 14px; background: var(--red-deep); color: var(--white);
    font-size: 14px; font-weight: 800; font-family: inherit; border: none; border-radius: 12px; cursor: pointer;
  }
  .btn-reload:active, .btn-reset:active { opacity: 0.8; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-club-logo">
    <img src="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png" alt="ERFC" onerror="this.parentNode.innerHTML='🕷️'">
  </div>
  <h2>Eltham Redbacks FC</h2>
  <p class="setup-sub">Paste your Google Apps Script URL to connect to the Soccerstats sheet.</p>
  <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="btn-setup" onclick="saveScriptUrl()">Connect to Google Sheets</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none; max-width:500px; margin:0 auto;">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">
        <img src="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png" alt="ERFC" onerror="this.parentNode.innerHTML='🕷️'">
      </div>
      <div class="header-title">
        <span class="kicker">Match Stats</span>
        <h1>Eltham <span>Redbacks</span></h1>
      </div>
    </div>
    <div class="match-badge" onclick="openDateModal()">
      <span class="date-label">Match Date</span>
      <span class="date-val" id="displayDate">—</span>
    </div>
  </div>

  <div class="header-stripe"></div>

  <div class="scoreboard">
    <div class="score-item">
      <div class="score-num" id="totalGoals">0</div>
      <div class="score-label">Goals</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-num" id="totalAssists">0</div>
      <div class="score-label">Assists</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-num" id="totalPlayers">0</div>
      <div class="score-label">Players</div>
    </div>
  </div>

  <div class="content">
    <div class="section-label">Squad</div>
    <div class="player-list" id="playerList">
      <div class="loading-state"><div class="spinner"></div>Loading squad…</div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn-reset" onclick="confirmReset()">⚙ Settings</button>
    <button class="btn-reload" onclick="loadPlayers()">↻ Refresh Squad</button>
  </div>
</div>

<!-- Date Modal -->
<div class="modal-overlay" id="dateModal" onclick="closeDateModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Select Match Date</div>
    <input type="date" id="matchDateInput">
    <button class="btn-confirm" onclick="confirmDate()">Confirm Date</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — paste your Google Apps Script /exec URL below
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXiyok9ppKVlzDTNFDQDo7sNaEqRCRhJG5WS0ASRMcDmfFmEnl44fmMg6d94Kxt7ck/exec';
// ============================================================

const STORAGE_KEY_URL  = 'redbacks_script_url';
const STORAGE_KEY_DATE = 'redbacks_match_date';

let scriptUrl = '';
let matchDate = '';
let players = [];
let sessionGoals   = {};
let sessionAssists = {};

// ---- INIT ----
function init() {
  scriptUrl = SCRIPT_URL || localStorage.getItem(STORAGE_KEY_URL) || '';
  matchDate = localStorage.getItem(STORAGE_KEY_DATE) || todayStr();

  if (!scriptUrl) {
    show('setupScreen'); hide('mainApp');
  } else {
    hide('setupScreen'); show('mainApp');
    updateDateDisplay();
    loadPlayers();
  }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function show(id)   { document.getElementById(id).style.display = 'block'; }
function hide(id)   { document.getElementById(id).style.display = 'none'; }

function saveScriptUrl() {
  const val = document.getElementById('scriptUrlInput').value.trim();
  if (!val.startsWith('https://script.google.com')) {
    showToast('Please enter a valid Script URL', 'error'); return;
  }
  scriptUrl = val;
  localStorage.setItem(STORAGE_KEY_URL, scriptUrl);
  hide('setupScreen'); show('mainApp');
  updateDateDisplay(); loadPlayers();
}

function confirmReset() {
  if (confirm('Change the Google Script URL?')) {
    document.getElementById('scriptUrlInput').value = scriptUrl;
    show('setupScreen'); hide('mainApp');
  }
}

// ---- DATE ----
function openDateModal() {
  document.getElementById('matchDateInput').value = matchDate;
  document.getElementById('dateModal').classList.add('open');
}
function closeDateModal(e) {
  if (e.target === document.getElementById('dateModal'))
    document.getElementById('dateModal').classList.remove('open');
}
function confirmDate() {
  const val = document.getElementById('matchDateInput').value;
  if (!val) return;
  matchDate = val;
  localStorage.setItem(STORAGE_KEY_DATE, matchDate);
  updateDateDisplay();
  sessionGoals = {}; sessionAssists = {};
  document.getElementById('dateModal').classList.remove('open');
  showToast('Match date updated', 'success');
  renderPlayers();
}
function updateDateDisplay() {
  const el = document.getElementById('displayDate');
  if (!matchDate) { el.textContent = '—'; return; }
  const d = new Date(matchDate + 'T00:00:00');
  el.textContent = d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
}

// ---- JSONP HELPER ----
// Google Apps Script redirects fetch() requests, breaking CORS.
// JSONP loads the response as a <script> tag, bypassing this entirely.
function jsonp(url, callback) {
  const fnName = '_gs_' + Math.random().toString(36).slice(2);
  const script  = document.createElement('script');
  let done = false;

  const timer = setTimeout(() => {
    if (done) return;
    done = true;
    cleanup();
    callback(null, new Error('Request timed out'));
  }, 15000);

  window[fnName] = function(data) {
    if (done) return;
    done = true;
    cleanup();
    callback(data, null);
  };

  function cleanup() {
    clearTimeout(timer);
    delete window[fnName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  // Append callback param — Google Apps Script will wrap the JSON in this function call
  const sep = url.includes('?') ? '&' : '?';
  script.src = url + sep + 'callback=' + fnName;
  script.onerror = function() {
    if (done) return;
    done = true;
    cleanup();
    callback(null, new Error('Script load failed'));
  };
  document.head.appendChild(script);
}

// ---- LOAD PLAYERS ----
function loadPlayers() {
  document.getElementById('playerList').innerHTML =
    '<div class="loading-state"><div class="spinner"></div>Loading squad…</div>';

  jsonp(scriptUrl + '?action=getPlayers', function(data, err) {
    if (err || !data) {
      document.getElementById('playerList').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not connect to Google Sheets.<br>Check your Script URL and deployment settings.</p></div>';
      showToast('Connection error', 'error');
      return;
    }
    if (data.error) {
      document.getElementById('playerList').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><p>' + data.error + '</p></div>';
      showToast('Sheet error', 'error');
      return;
    }
    players = data.players || [];
    sessionGoals = {}; sessionAssists = {};
    renderPlayers();
    updateScoreboard();
    showToast(players.length + ' players loaded', 'success');
  });
}

// ---- RENDER PLAYERS ----
function renderPlayers() {
  const list = document.getElementById('playerList');
  if (!players.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">👦</div><p>No players found.<br>Add names to the Name column in your sheet.</p></div>';
    return;
  }
  list.innerHTML = players.map((p, i) => {
    const initials = p.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const g = sessionGoals[p.name]   || 0;
    const a = sessionAssists[p.name] || 0;
    return `<div class="player-card" id="card-${i}">
      <div class="player-avatar">${initials}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-stats">
          <span class="stat-g">⚽ ${p.goals + g}</span>
          <span class="stat-a">★ ${p.assists + a}</span>
          <span>season</span>
        </div>
      </div>
      <div class="player-actions">
        <button class="btn-action btn-goal"   onclick="recordStat(${i},'goal')"   id="btn-goal-${i}">
          <span class="btn-icon">⚽</span><span class="btn-label">Goal</span>
        </button>
        <button class="btn-action btn-assist" onclick="recordStat(${i},'assist')" id="btn-assist-${i}">
          <span class="btn-icon">★</span><span class="btn-label">Assist</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ---- RECORD STAT ----
function recordStat(idx, type) {
  const player = players[idx];
  const btn    = document.getElementById('btn-' + type + '-' + idx);
  const card   = document.getElementById('card-' + idx);
  btn.classList.add('loading');

  const params = new URLSearchParams({
    action: 'recordStat',
    name:   player.name,
    type:   type,
    date:   matchDate
  });

  jsonp(scriptUrl + '?' + params.toString(), function(data, err) {
    btn.classList.remove('loading');
    if (err || !data) {
      showToast('Failed to save — check connection', 'error'); return;
    }
    if (data.error) {
      showToast('Error: ' + data.error, 'error'); return;
    }
    if (type === 'goal') {
      sessionGoals[player.name]   = (sessionGoals[player.name]   || 0) + 1;
      card.classList.add('flash-goal');
      showToast('Goal — ' + player.name + ' ⚽', 'success');
    } else {
      sessionAssists[player.name] = (sessionAssists[player.name] || 0) + 1;
      card.classList.add('flash-assist');
      showToast('Assist — ' + player.name + ' ★', 'success');
    }
    setTimeout(() => card.classList.remove('flash-goal','flash-assist'), 600);
    renderPlayers();
    updateScoreboard();
  });
}

// ---- SCOREBOARD ----
function updateScoreboard() {
  let g = players.reduce((s,p) => s + p.goals,  0);
  let a = players.reduce((s,p) => s + p.assists, 0);
  Object.values(sessionGoals).forEach(v   => g += v);
  Object.values(sessionAssists).forEach(v => a += v);
  document.getElementById('totalGoals').textContent   = g;
  document.getElementById('totalAssists').textContent = a;
  document.getElementById('totalPlayers').textContent = players.length;
}

// ---- TOAST ----
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
